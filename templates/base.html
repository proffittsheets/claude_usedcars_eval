<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Car Vision Board{% endblock %} — Sheets Family</title>
  <link rel="stylesheet" href="{{ root }}static/css/main.css">
  <link rel="stylesheet" href="{{ root }}static/css/cards.css">
  <link rel="stylesheet" href="{{ root }}static/css/gallery.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ root }}index.html" class="site-logo">
        <span class="logo-text">Car Vision Board</span>
        <span class="logo-sub">Sheets Family · Atlanta, GA</span>
      </a>
      <nav class="site-nav">
        <a href="{{ root }}index.html">All Cars</a>
        <a href="{{ root }}toyota.html">Toyota</a>
        <a href="{{ root }}nissan.html">Nissan</a>
        <a href="{{ root }}mercedes-benz.html">Mercedes</a>
        <a href="{{ root }}lincoln.html">Lincoln</a>
      </nav>
    </div>
  </header>

  {% block hero %}{% endblock %}

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Personal research project · Molly &amp; Justin Sheets ·
      <a href="{{ root }}sources.html">Sources &amp; Attributions</a>
    </p>
  </footer>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button id="lightbox-close" aria-label="Close image viewer">&#x2715;</button>
    <button id="lightbox-prev" aria-label="Previous image">&#x2039;</button>
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-next" aria-label="Next image">&#x203a;</button>
  </div>

  <script src="{{ root }}static/js/gallery.js"></script>
  <script src="{{ root }}static/js/filters.js"></script>
  <script src="{{ root }}static/js/dropdown.js"></script>
  <script src="{{ root }}static/js/carousel.js"></script>
</body>
</html>
